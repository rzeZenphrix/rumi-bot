services:
  - type: web
    name: rumi-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:single
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENABLE_API
        value: "true"
