services:
  - type: worker
    name: rumi-bot-worker
    env: docker
    rootDir: ..
    dockerfilePath: ./rumi/Dockerfile.worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: BOT_MODE
        value: single
      - key: NO_SHARDS
        value: "true"
      - key: ENABLE_API
        value: "false"
      - key: MUSIC_READY
        value: "true"
      - key: MUSIC_SLASH_OWNER
        value: sidecar
      - key: RUMI_MUSIC_REGISTER_SLASH
        value: "true"
      - key: RUMI_MUSIC_LISTEN_SLASH
        value: "true"
      - key: RUMI_MUSIC_SERVICE_PORT
        value: "3025"
      - key: RUMI_MUSIC_SERVICE_URL
        value: http://127.0.0.1:3025
      - key: LAVALINK_URL
        value: http://127.0.0.1:2333
      - key: LAVALINK_PASSWORD
        value: youshallnotpass
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: BOT_OWNER_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENEXCHANGERATES_APP_ID
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: LAVALINK_RESUME_KEY
        value: rumi-music
      - key: RUMI_DASHBOARD_BACKEND_URL
        value: https://rumi.rocks
      - key: DASHBOARD_URL
        value: https://rumi.rocks
      - key: DASHBOARD_PUBLIC_URL
        value: https://rumi.rocks
      - key: DASHBOARD_FRONTEND_URL
        value: https://rumi.rocks/studio
      - key: STUDIO_URL
        value: https://rumi.rocks/studio
