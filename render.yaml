services:
  - type: worker
    name: rumi-bot-worker
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run start:worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_MODE
        value: single
      - key: NO_SHARDS
        value: "true"
      - key: ENABLE_API
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: BOT_OWNER_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENEXCHANGERATES_APP_ID
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
      - key: LAVALINK_URL
        sync: false
      - key: LAVALINK_PASSWORD
        sync: false
      - key: RUMI_DASHBOARD_BACKEND_URL
        value: https://rumi.rocks
      - key: DASHBOARD_URL
        value: https://rumi.rocks
      - key: DASHBOARD_PUBLIC_URL
        value: https://rumi.rocks
